# Commissioning hardware manifest for the 1690X sample chassis.
#
# Ports, cartridges, direction flags, drive-wheel size, nominal track width and
# tooth paths were supplied by the operator. Calibration fields remain null.
# The six direction booleans came from VEX motor-constructor arguments and are
# stored directly as runtime reversed flags. The previous polarity inversion
# made positive chassis voltage move the robot backward; the corrected values
# below still require an airborne repeat test. Official capabilities remain
# locked while verification.hardware is not HILValidated or better.

identity:
  schema_version: 2
  calibration_revision: 0
  team_number: "1690X"
  robot_id: "1690X"
  hardware_revision: null
  wheel_and_gearing: "2.75in wheel; mixed 6:1 and 18:1 cartridges; nominal 450 wheel rpm"

platform:
  framework: "PROS"
  kernel_version: "4.2.2"
  language_standard: "C++17"
  nominal_control_period_ms: 10

coordinate_contract:
  body_x_positive: "forward"
  body_y_positive: "left"
  theta_positive: "counter_clockwise_from_above"
  linear_unit: "metre"
  angular_unit: "radian"
  time_interval_unit: "second"
  voltage_unit: "volt"

hardware:
  left_drive:
    - { smart_port: 11, reversed: false, cartridge_rpm: 600, motor_rev_per_wheel_rev: 1.3333333333333333 } # LA; 36T -> 48T
    - { smart_port: 12, reversed: true,  cartridge_rpm: 200, motor_rev_per_wheel_rev: 0.4444444444444444 } # LM; 36T -> 12T, coaxial 36T -> 48T
    - { smart_port: 13, reversed: true,  cartridge_rpm: 600, motor_rev_per_wheel_rev: 1.3333333333333333 } # LB; 36T -> 48T
  right_drive:
    - { smart_port: 1, reversed: true,  cartridge_rpm: 600, motor_rev_per_wheel_rev: 1.3333333333333333 } # RA; 36T -> 48T
    - { smart_port: 2, reversed: false, cartridge_rpm: 200, motor_rev_per_wheel_rev: 0.4444444444444444 } # RM; 36T -> 12T, coaxial 36T -> 48T
    - { smart_port: 3, reversed: false, cartridge_rpm: 600, motor_rev_per_wheel_rev: 1.3333333333333333 } # RB; 36T -> 48T
  imu:
    installed: false
    smart_port: null
    mounting: "not installed"
  parallel_rotation:
    installed: false
    smart_port: null
    reversed: null
    offset_y_m: null
  lateral_rotation:
    installed: false
    smart_port: null
    reversed: null
    offset_x_m: null

geometry:
  nominal_drive_wheel_diameter_m: 0.06985 # supplied 2.75 in
  nominal_track_width_m: 0.1524          # supplied SolidWorks 6 in
  source: "operator/CAD; not field calibrated"

calibration:
  left_m_per_motor_rad: null
  right_m_per_motor_rad: null
  effective_track_width_m: null

verification:
  implementation: "Implemented"
  pc: "PCValidated"
  simulation: "NotTested"
  hardware: "Unverified"
  field: "Unverified"
  competition: "Unverified"
  last_direction_observation: "Previous inverted config: forward stick moved robot backward; corrected config awaiting airborne repeat"

capabilities:
  hardware_output: false
  driver_control: false
  pose_good: false
  autonomous_chassis_velocity: false
  autonomous_motion: false
  competition_routes: false
  selected_route: "DoNothing"

commissioning_test:
  enabled_in_non_field_opcontrol: true
  tuning_revision: 4
  maximum_voltage_V: 12.0
  controller_mapping: "Left Y throttle; Left X curvature; single-stick Curvature"
  curvature_gain: 1.0
  quick_turn_gain: 1.0
  quick_turn_trigger: "automatic while Left X is nonzero and throttle is within the hysteresis gate"
  quick_turn_enter_throttle: 0.15
  quick_turn_exit_throttle: 0.25
  arming: "none; drive is active immediately in non-field opcontrol"
  coast_button: "B; hold for immediate Coast, release to resume stick control"
  zero_behavior: "Coast for neutral, B, disabled, disconnect, request stale, and output stale"
  throttle_rise_per_s: 20.0
  throttle_fall_per_s: 20.0
  turn_rise_per_s: 20.0
  turn_fall_per_s: 20.0
  output_rise_V_per_s: 240.0
  output_fall_V_per_s: 240.0
  nominal_full_scale_ramp_s: 0.05
  tuning_status: "Automatic full-gain Quick Turn and 50 ms full-scale response are aggressive HIL candidates; retest required"
