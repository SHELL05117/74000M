# Robot hardware profile registry.
#
# ROBOT_PROFILE is selected at compile time. Identity and Smart Ports are
# selected together; do not copy ports between profiles at runtime.

schema_version: 1
default_build_profile: "492Z"
profiles:
  "492X": "config/robots/492X.yaml"
  "492Z": "config/robots/492Z.yaml"

shared_configuration:
  drivetrain_direction_gearing: true
  lift_direction_gearing_travel: true
  geometry: true
  control_and_safety_parameters: true
  sensors_installed: false
