name: PC tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build/pc -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build/pc --parallel
      - name: Test
        run: ctest --test-dir build/pc --output-on-failure
