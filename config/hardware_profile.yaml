# Offline hardware manifest for 74000M.
#
# Only the six drivetrain motor facts below have been supplied. Every remaining
# null must still come from the wiring table, CAD, physical inspection, or a
# calibration record. The supplied direction flag means true=forward, while the
# runtime field is reversed, so reversed = !supplied_forward. Runtime code must
# keep every capability locked while verification.hardware is not HILValidated
# or better.

identity:
  schema_version: 1
  calibration_revision: 0
  robot_id: "UNVERIFIED_74000M"
  hardware_revision: null
  wheel_and_gearing: "UNVERIFIED"

platform:
  framework: "PROS"
  kernel_version: "4.2.2"
  language_standard: "C++17"
  nominal_control_period_ms: 10

coordinate_contract:
  body_x_positive: "forward"
  body_y_positive: "left"
  theta_positive: "counter_clockwise_from_above"
  linear_unit: "metre"
  angular_unit: "radian"
  time_interval_unit: "second"
  voltage_unit: "volt"

hardware:
  left_drive:
    - { smart_port: 11, reversed: true,  cartridge_rpm: 600 } # Motor_DT_LA; supplied_forward=false; ratio6_1
    - { smart_port: 12, reversed: false, cartridge_rpm: 200 } # Motor_DT_LM; supplied_forward=true;  ratio18_1
    - { smart_port: 13, reversed: false, cartridge_rpm: 600 } # Motor_DT_LB; supplied_forward=true;  ratio6_1
  right_drive:
    - { smart_port: 1, reversed: false, cartridge_rpm: 600 } # Motor_DT_RA; supplied_forward=true;  ratio6_1
    - { smart_port: 2, reversed: true,  cartridge_rpm: 200 } # Motor_DT_RM; supplied_forward=false; ratio18_1
    - { smart_port: 3, reversed: true,  cartridge_rpm: 600 } # Motor_DT_RB; supplied_forward=false; ratio6_1
  imu:
    smart_port: null
    mounting: null
  parallel_rotation:
    installed: null
    smart_port: null
    reversed: null
    offset_y_m: null
  lateral_rotation:
    installed: null
    smart_port: null
    reversed: null
    offset_x_m: null

geometry:
  nominal_drive_wheel_diameter_m: null
  motor_rev_per_wheel_rev: null
  nominal_track_width_m: null

calibration:
  left_m_per_motor_rad: null
  right_m_per_motor_rad: null
  effective_track_width_m: null

verification:
  implementation: "Implemented"
  pc: "PCValidated"
  simulation: "NotTested"
  hardware: "Unverified"
  field: "Unverified"
  competition: "Unverified"

capabilities:
  hardware_output: false
  driver_control: false
  pose_good: false
  autonomous_chassis_velocity: false
  autonomous_motion: false
  competition_routes: false
  selected_route: "DoNothing"
